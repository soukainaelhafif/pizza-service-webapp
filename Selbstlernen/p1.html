<body>
    <h1>Bestellung</h1>

    <main>
    <h2>Speisekarte</h2>
    
        <section>
            <img src ="../src/Praktikum/Prak3/EWA_Framework/assets/images/pizza_salami.png" alt = "Pizza salami" width =200>

        </select>

        <p> Gesamtpreis: </p>
        <button type ="button">Auswahl löschen</button>

        </form>
